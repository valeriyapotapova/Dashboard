<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Risk Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}

.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px;
}

.header {
  display: flex;
  align-items: center;
  gap: 14px;
  background: #fff;
  border: 0.5px solid #e2e4e8;
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 20px;
}
.header-icon {
  width: 42px; height: 42px;
  border-radius: 10px;
  background: #042C53;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.header-icon svg { width: 20px; height: 20px; }
.header-title { font-size: 16px; font-weight: 600; color: #1a1a2e; }
.header-sub   { font-size: 12px; color: #6b7280; margin-top: 1px; }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.kpi-card {
  background: #fff;
  border: 0.5px solid #e2e4e8;
  border-radius: 12px;
  padding: 16px 20px;
}
.kpi-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #6b7280;
  margin-bottom: 6px;
}
.kpi-value { font-size: 30px; font-weight: 600; line-height: 1; color: #1a1a2e; }
.kpi-value.danger  { color: #A32D2D; }
.kpi-value.success { color: #3B6D11; }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.filter-btn {
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 99px;
  border: 0.5px solid #d1d5db;
  background: #fff;
  color: #374151;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.filter-btn:hover  { background: #f3f4f6; }
.filter-btn.active { background: #042C53; border-color: #042C53; color: #B5D4F4; }

.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.chart-card {
  background: #fff;
  border: 0.5px solid #e2e4e8;
  border-radius: 14px;
  padding: 18px 20px;
}
.chart-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #9ca3af;
  margin-bottom: 14px;
}
.matrix-wrap { position: relative; width: 100%; aspect-ratio: 1; }
.bar-wrap     { position: relative; width: 100%; height: 240px; }

.table-card {
  background: #fff;
  border: 0.5px solid #e2e4e8;
  border-radius: 14px;
  overflow: hidden;
}
.table-scroll { overflow-x: auto; }
.risk-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
.risk-table th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  color: #9ca3af;
  border-bottom: 0.5px solid #e2e4e8;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
  background: #fafafa;
}
.risk-table td {
  padding: 9px 14px;
  border-bottom: 0.5px solid #f0f2f5;
  color: #1a1a2e;
  white-space: nowrap;
}
.risk-table tr:last-child td { border-bottom: none; }
.risk-table tr:hover td { background: #f9fafb; }

.badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
}
.badge-critical { background: #FCEBEB; color: #791F1F; }
.badge-high     { background: #FAEEDA; color: #633806; }
.badge-medium   { background: #EAF3DE; color: #27500A; }
.badge-low      { background: #E6F1FB; color: #0C447C; }

.status { display: flex; align-items: center; gap: 5px; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-open    { background: #E24B4A; }
.dot-control { background: #EF9F27; }
.dot-work    { background: #378ADD; }
.dot-closed  { background: #639922; }

.id-chip { font-weight: 600; color: #185FA5; }
</style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#B5D4F4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Дашборд рисков</div>
      <div class="header-sub">Система квантового шифрования</div>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Всего рисков</div>
