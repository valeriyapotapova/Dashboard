<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Risk Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}

.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px;
}

.header {
  display: flex;
  align-items: center;
  gap: 14px;
  background: #fff;
  border: 0.5px solid #e2e4e8;
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 20px;
}
.header-icon {
  width: 42px; height: 42px;
  border-radius: 10px;
  background: #042C53;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.header-icon svg { width: 20px; height: 20px; }
.header-title { font-size: 16px; font-weight: 600; color: #1a1a2e; }
.header-sub   { font-size: 12px; color: #6b7280; margin-top: 1px; }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.kpi-card {
  background: #fff;
  border: 0.5px solid #e2e4e8;
  border-radius: 12px;
  padding: 16px 20px;
}
.kpi-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #6b7280;
  margin-bottom: 6px;
}
.kpi-value { font-size: 30px; font-weight: 600; line-height: 1; color: #1a1a2e; }
.kpi-value.danger  { color: #A32D2D; }
.kpi-value.success { color: #3B6D11; }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.filter-btn {
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 99px;
  border: 0.5px solid #d1d5db;
  background: #fff;
  color: #374151;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.filter-btn:hover  { background: #f3f4f6; }
.filter-btn.active { background: #042C53; border-color: #042C53; color: #B5D4F4; }

.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.chart-card {
  background: #fff;
  border: 0.5px solid #e2e4e8;
  border-radius: 14px;
  padding: 18px 20px;
}
.chart-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #9ca3af;
  margin-bottom: 14px;
}
.matrix-wrap { position: relative; width: 100%; aspect-ratio: 1; }
.bar-wrap     { position: relative; width: 100%; height: 240px; }

.table-card {
  background: #fff;
  border: 0.5px solid #e2e4e8;
  border-radius: 14px;
  overflow: hidden;
}
.table-scroll { overflow-x: auto; }
.risk-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
.risk-table th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  color: #9ca3af;
  border-bottom: 0.5px solid #e2e4e8;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
  background: #fafafa;
}
.risk-table td {
  padding: 9px 14px;
  border-bottom: 0.5px solid #f0f2f5;
  color: #1a1a2e;
  white-space: nowrap;
}
.risk-table tr:last-child td { border-bottom: none; }
.risk-table tr:hover td { background: #f9fafb; }

.badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
}
.badge-critical { background: #FCEBEB; color: #791F1F; }
.badge-high     { background: #FAEEDA; color: #633806; }
.badge-medium   { background: #EAF3DE; color: #27500A; }
.badge-low      { background: #E6F1FB; color: #0C447C; }

.status { display: flex; align-items: center; gap: 5px; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-open    { background: #E24B4A; }
.dot-control { background: #EF9F27; }
.dot-work    { background: #378ADD; }
.dot-closed  { background: #639922; }

.id-chip { font-weight: 600; color: #185FA5; }
</style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#B5D4F4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Дашборд рисков</div>
      <div class="header-sub">Система квантового шифрования</div>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Всего рисков</div>
      <div class="kpi-value" id="kpi-total">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Критичные</div>
      <div class="kpi-value danger" id="kpi-critical">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Закрытые</div>
      <div class="kpi-value success" id="kpi-closed">—</div>
    </div>
  </div>

  <div class="controls" id="filters"></div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-label">Матрица рисков</div>
      <div class="matrix-wrap">
        <canvas id="matrixChart" role="img" aria-label="Матрица рисков: вероятность × влияние"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-label">Уровень рисков</div>
      <div class="bar-wrap">
        <canvas id="barChart" role="img" aria-label="Уровень рисков по ID"></canvas>
      </div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-scroll">
      <table class="risk-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Категория</th>
            <th>Вер.</th>
            <th>Влияние</th>
            <th>Уровень</th>
            <th>Статус</th>
            <th>Владелец</th>
            <th>Срок</th>
            <th>KRI</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const data = [
  { id:"R1",  name:"Высокая стоимость оборудования",  cat:"Финансовый",     p:4, i:5, status:"Открыт",        owner:"Финансовый директор",  date:"2026-12-01", kri:"Рост CAPEX > 15%"    },
  { id:"R2",  name:"Ограничение расстояния передачи", cat:"Технологический", p:3, i:5, status:"Открыт",        owner:"Технический директор", date:"2026-11-15", kri:"Дальность < 120 км"  },
  { id:"R3",  name:"Длительная сертификация",         cat:"Регуляторный",    p:4, i:4, status:"Под контролем", owner:"Юридический отдел",    date:"2027-02-01", kri:"Срок > 12 мес"       },
  { id:"R4",  name:"Низкий спрос на технологию",      cat:"Рыночный",        p:3, i:4, status:"Открыт",        owner:"Маркетинг",            date:"2027-03-01", kri:"< 20 клиентов"       },
  { id:"R5",  name:"Высокое энергопотребление",        cat:"Технологический", p:2, i:3, status:"Закрыт",        owner:"Инженерный отдел",     date:"2026-10-01", kri:"> 8 кВт"             },
  { id:"R6",  name:"Недостаток финансирования",        cat:"Финансовый",     p:5, i:5, status:"Открыт",        owner:"CEO",                  date:"2026-12-20", kri:"Cash < 0"            },
  { id:"R7",  name:"Сбой квантового канала",           cat:"Технологический", p:4, i:5, status:"Открыт",        owner:"Инженер",              date:"2026-11-10", kri:"Ошибка > 12%"        },
  { id:"R8",  name:"Утечка данных",                    cat:"Безопасность",    p:3, i:5, status:"В работе",      owner:"CISO",                 date:"2026-11-25", kri:"Инциденты"           },
  { id:"R9",  name:"Отсутствие специалистов",          cat:"HR",              p:4, i:4, status:"Открыт",        owner:"HR",                   date:"2026-12-15", kri:"< 3 специалистов"    },
  { id:"R10", name:"Срыв сроков проекта",              cat:"Управленческий",  p:5, i:4, status:"Открыт",        owner:"PM",                   date:"2026-11-30", kri:"Сдвиг сроков"        },
  { id:"R11", name:"Ошибки в алгоритмах",              cat:"Технологический", p:3, i:4, status:"Открыт",        owner:"R&D",                  date:"2026-12-05", kri:"Баги"                },
  { id:"R12", name:"Рост затрат",                      cat:"Финансовый",     p:4, i:4, status:"Под контролем", owner:"CFO",                  date:"2026-12-10", kri:"+20%"                },
  { id:"R13", name:"Проблемы с поставщиками",          cat:"Логистика",       p:3, i:3, status:"Открыт",        owner:"Supply",               date:"2026-11-20", kri:"Задержки"            },
  { id:"R14", name:"Нарушение стандартов",             cat:"Регуляторный",    p:2, i:5, status:"Открыт",        owner:"Юристы",               date:"2027-01-01", kri:"Штрафы"              },
  { id:"R15", name:"Кибератаки",                       cat:"Безопасность",    p:4, i:5, status:"Открыт",        owner:"Security",             date:"2026-11-18", kri:"Атаки"               },
  { id:"R16", name:"Отказ оборудования",               cat:"Технологический", p:3, i:4, status:"Открыт",        owner:"Инженер",              date:"2026-12-01", kri:"Сбои"                },
  { id:"R17", name:"Низкая производительность",        cat:"Технологический", p:2, i:3, status:"Открыт",        owner:"R&D",                  date:"2026-12-10", kri:"Скорость"            },
  { id:"R18", name:"Проблемы интеграции",              cat:"IT",              p:3, i:4, status:"Открыт",        owner:"IT",                   date:"2026-12-05", kri:"Ошибки API"          },
  { id:"R19", name:"Юридические риски",                cat:"Регуляторный",    p:3, i:5, status:"Открыт",        owner:"Юристы",               date:"2027-01-10", kri:"Иски"                },
  { id:"R20", name:"Падение спроса",                   cat:"Рыночный",        p:4, i:4, status:"Открыт",        owner:"Маркетинг",            date:"2027-02-01", kri:"Продажи"             }
];

let matrixChart, barChart;
let activeFilter = 'all';

function sc(r) { return r.p * r.i; }

function levelBadge(s) {
  if (s >= 16) return `<span class="badge badge-critical">${s}</span>`;
  if (s >= 12) return `<span class="badge badge-high">${s}</span>`;
  if (s >= 6)  return `<span class="badge badge-medium">${s}</span>`;
  return `<span class="badge badge-low">${s}</span>`;
}

function statusHTML(s) {
  const cls = s === 'Закрыт'        ? 'dot-closed'
            : s === 'Под контролем' ? 'dot-control'
            : s === 'В работе'      ? 'dot-work'
            :                         'dot-open';
  return `<span class="status"><span class="dot ${cls}"></span>${s}</span>`;
}

function bubbleColor(s) {
  if (s >= 16) return 'rgba(162,45,45,0.75)';
  if (s >= 9)  return 'rgba(186,117,23,0.65)';
  return 'rgba(63,109,17,0.55)';
}

function updateKPI(f) {
  document.getElementById('kpi-total').textContent    = f.length;
  document.getElementById('kpi-critical').textContent = f.filter(r => sc(r) >= 16).length;
  document.getElementById('kpi-closed').textContent   = f.filter(r => r.status === 'Закрыт').length;
}

function renderTable(f) {
  document.getElementById('tbody').innerHTML = f.map(r => `
    <tr>
      <td class="id-chip">${r.id}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis">${r.name}</td>
      <td style="color:#6b7280">${r.cat}</td>
      <td>${r.p}</td>
      <td>${r.i}</td>
      <td>${levelBadge(sc(r))}</td>
      <td>${statusHTML(r.status)}</td>
      <td style="color:#6b7280">${r.owner}</td>
      <td style="color:#6b7280">${r.date}</td>
      <td style="color:#9ca3af;font-size:11px">${r.kri}</td>
    </tr>
  `).join('');
}

function renderMatrix(f) {
  const cells = {};
  f.forEach(r => {
    const key = `${r.p},${r.i}`;
    if (!cells[key]) cells[key] = [];
    cells[key].push(r.id);
  });
  const bubbles = Object.entries(cells).map(([key, ids]) => {
    const [px, py] = key.split(',').map(Number);
    return { x: px, y: py, r: Math.max(16, ids.length * 11), ids, score: px * py };
  });
  if (matrixChart) matrixChart.destroy();
  matrixChart = new Chart(document.getElementById('matrixChart'), {
    type: 'bubble',
    data: {
      datasets: [{
        data: bubbles.map(b => ({ x: b.x, y: b.y, r: b.r })),
        backgroundColor: bubbles.map(b => bubbleColor(b.score)),
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const b = bubbles[ctx.dataIndex];
              return `${b.ids.join(', ')} · Score ${b.score}`;
            }
          }
        }
      },
      scales: {
        x: {
          min: 0.5, max: 5.5,
          title: { display: true, text: 'Вероятность', color: '#9ca3af', font: { size: 11 } },
          ticks: { stepSize: 1, color: '#9ca3af', font: { size: 10 } },
          grid:  { color: 'rgba(0,0,0,0.05)' }
        },
        y: {
          min: 0.5, max: 5.5,
          title: { display: true, text: 'Влияние', color: '#9ca3af', font: { size: 11 } },
          ticks: { stepSize: 1, color: '#9ca3af', font: { size: 10 } },
          grid:  { color: 'rgba(0,0,0,0.05)' }
        }
      }
    }
  });
}

function renderBar(f) {
  const sorted = [...f].sort((a, b) => sc(b) - sc(a));
  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: sorted.map(r => r.id),
      datasets: [{
        data: sorted.map(r => sc(r)),
        backgroundColor: sorted.map(r => {
          const s = sc(r);
          return s >= 16 ? '#A32D2D' : s >= 9 ? '#BA7517' : '#3B6D11';
        }),
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `Уровень: ${ctx.raw}` } }
      },
      scales: {
        x: {
          ticks: { color: '#9ca3af', font: { size: 9 }, autoSkip: true, maxRotation: 0 },
          grid:  { display: false }
        },
        y: {
          beginAtZero: true,
          ticks: { color: '#9ca3af', font: { size: 10 } },
          grid:  { color: 'rgba(0,0,0,0.05)' }
        }
      }
    }
  });
}

function initFilters() {
  const cats = ['all', ...new Set(data.map(d => d.cat))];
  const wrap = document.getElementById('filters');
  wrap.innerHTML = cats.map(c =>
    `<button class="filter-btn ${c === 'all' ? 'active' : ''}" data-cat="${c}">${c === 'all' ? 'Все' : c}</button>`
  ).join('');
  wrap.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    wrap.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    render();
  });
}

function render() {
  const f = activeFilter === 'all' ? data : data.filter(r => r.cat === activeFilter);
  updateKPI(f);
  renderTable(f);
  renderMatrix(f);
  renderBar(f);
}

initFilters();
render();
</script>

</body>
</html>
